spring:
  application:
    name: course-service
  datasource:
    url: jdbc:h2:mem:coursedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 16
  sql:
    init:
      mode: always
      encoding: UTF-8


server:
  port: 8083

user-service:
  base-url: http://localhost:8082

jwt:
  secret: ZEdOaFkyUnZZbkp5Ykc4dGRHaGxjMmx6TFhOMWNHVnlMWE5sWTNKbGRDMXJaWGt0TWpBeU5n
  expiration-ms: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  media:
    dir: ./uploads
