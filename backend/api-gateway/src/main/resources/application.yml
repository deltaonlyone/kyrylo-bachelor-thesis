spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          "[/**]":
            allowedOriginPatterns:
              - "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

      routes:
        - id: auth-service
          uri: http://localhost:8082
          predicates:
            - Path=/auth/**
        - id: user-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/users/**,/api/me/**,/api/organizations/**
        - id: course-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/courses/**,/api/enrollments/**,/api/quizzes/**,/api/media/**,/api/skills/**,/api/tasks/**
        - id: core-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/core/**
          filters:
            - RewritePath=/api/core/(?<segment>.*), /$\{segment}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
